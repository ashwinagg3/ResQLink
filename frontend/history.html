<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ResQLink | History</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.155.0/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#af101a",
                        "surface": "#fff8f7",
                        "on-surface": "#271816",
                        "on-surface-variant": "#5b403d"
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --mesh-color-1: #af101a05;
            --mesh-color-2: #ffffff;
        }
        body {
            background-color: var(--mesh-color-2);
            background-image: 
                radial-gradient(at 0% 0%, var(--mesh-color-1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, #af101a08 0, transparent 50%), 
                radial-gradient(at 100% 0%, var(--mesh-color-1) 0, transparent 50%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow-x: hidden;
        }
        /* Serious Tactical Background */
        .bg-3d-wrap {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-3d-primitive {
            position: absolute;
            opacity: 0.05;
            animation: float-tactical 25s infinite linear;
        }
        .sphere-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle at 30% 30%, #af101a, transparent 70%);
            top: -150px; left: -150px;
            filter: blur(80px);
        }
        .sphere-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle at 30% 30%, #af101a, transparent 70%);
            bottom: -50px; right: -50px;
            filter: blur(60px);
            animation-delay: -5s;
        }
        /* Tactical Glass Panes */
        .tactical-pane {
            width: 200px; height: 300px;
            background: rgba(175, 16, 26, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(175, 16, 26, 0.08);
            border-radius: 20px;
            transform: perspective(1000px) rotateX(20deg) rotateY(-20deg);
            position: absolute;
            animation: float-3d-pane 20s infinite ease-in-out;
        }
        .pane-1 { top: 20%; right: 5%; }
        .pane-2 { bottom: 20%; left: 10%; animation-delay: -10s; }

        @keyframes float-tactical {
            from { transform: rotate(0deg) translate(20px, 0) rotate(0deg); }
            to { transform: rotate(360deg) translate(20px, 0) rotate(-360deg); }
        }
        @keyframes float-3d-pane {
            0%, 100% { transform: perspective(1000px) rotateX(20deg) rotateY(-20deg) translateY(0); }
            50% { transform: perspective(1000px) rotateX(25deg) rotateY(-15deg) translateY(-30px); }
        }
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal;
            text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal;
            direction: ltr; -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(175, 16, 26, 0.05);
        }
        .premium-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .history-item {
            transition: all 0.4s ease;
            border-left: 4px solid transparent;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 1);
            border-left-color: #af101a;
            transform: translateX(8px);
        }
        .premium-badge {
            background: linear-gradient(135deg, #af101a 0%, #ff4d4d 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-on-surface min-h-screen">
    <div class="bg-3d-wrap">
        <div class="bg-3d-primitive sphere-1"></div>
        <div class="bg-3d-primitive sphere-2"></div>
        <div class="tactical-pane pane-1"></div>
        <div class="tactical-pane pane-2"></div>
    </div>
    <header class="h-20 flex items-center px-8 glass-header shadow-sm sticky top-0 z-40">
        <!-- Logo (Left) -->
        <div class="flex-1">
            <div class="text-2xl font-black tracking-tighter text-primary cursor-pointer active:scale-95 transition-transform inline-block" onclick="window.location.href='dashboard.html'">ResQLink</div>
        </div>

        <!-- Navigation (Center) -->
        <nav class="hidden md:flex gap-8 items-center h-full">
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm" href="dashboard.html">Dashboard</a>
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm" href="family.html">Family</a>
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm" href="contacts.html">Contacts</a>
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm" href="directory.html">Directory</a>
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm" href="messages.html">Messages</a>
            <a class="text-primary font-black border-b-2 border-primary pb-1 tracking-tight cursor-pointer text-sm" href="history.html">History</a>
        </nav>

        <!-- Actions (Right) -->
        <div class="flex-1 flex justify-end items-center gap-4">
            <button onclick="logout()" class="p-2 text-slate-400 hover:text-primary transition-colors"><span class="material-symbols-outlined">logout</span></button>
            <div onclick="window.location.href='profile.html'" class="w-10 h-10 rounded-full overflow-hidden border-2 border-slate-100 cursor-pointer shadow-sm hover:border-primary transition-all">
                <img src="https://ui-avatars.com/api/?name=User&background=0f172a&color=af101a&bold=true" id="navAvatar" alt="Profile"/>
            </div>
        </div>
    </header>

    <main class="py-16 px-6 max-w-5xl mx-auto">
        <header class="mb-16">
            <span class="text-[10px] font-black uppercase tracking-[0.4em] text-primary mb-4 block">Archive Intelligence</span>
            <h1 class="text-5xl md:text-6xl font-black tracking-tighter mb-6">Incident <span class="premium-badge">History</span></h1>
            <p class="text-on-surface-variant font-medium text-lg max-w-2xl leading-relaxed opacity-80">A verifiable ledger of all SOS broadcasts and security activations registered to this node.</p>
        </header>

        <section class="premium-card rounded-[3rem] overflow-hidden shadow-2xl shadow-slate-200/50">
            <div id="historyList" class="flex flex-col divide-y divide-slate-100/50">
                <!-- Loaded via JS -->
            </div>
        </section>
    </main>

    <script src="app.js"></script>
    <script src="immersive.js"></script>
    <script>
        const username = localStorage.getItem('username');

        async function loadHistory() {
            const alerts = await apiCall(`/alerts/${username}`);
            const list = document.getElementById('historyList');
            list.innerHTML = '';

            if (alerts.length === 0) {
                list.innerHTML = `
                    <div class="py-32 text-center flex flex-col items-center gap-6 opacity-40">
                        <div class="w-20 h-20 rounded-3xl bg-slate-50 flex items-center justify-center">
                            <span class="material-symbols-outlined text-4xl">inventory_2</span>
                        </div>
                        <p class="font-black text-xs uppercase tracking-[0.3em]">No incident records logged.</p>
                    </div>
                `;
                return;
            }

            alerts.forEach(a => {
                const date = new Date(a.timestamp);
                const dateStr = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
                const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                const responderNames = (a.contactsNotified && a.contactsNotified.length > 0) 
                    ? a.contactsNotified.join(', ') 
                    : 'System Broadcast Only';
                
                const item = document.createElement('div');
                item.className = 'history-item p-10 flex flex-col md:flex-row gap-10 items-start';
                item.innerHTML = `
                    <div class="flex flex-col items-center md:w-32 shrink-0 pt-2">
                        <span class="text-2xl font-black tracking-tighter leading-none mb-1">${timeStr.split(' ')[0]}</span>
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">${timeStr.split(' ')[1]}</span>
                        <div class="w-px h-12 bg-slate-100 my-4"></div>
                        <span class="text-[9px] font-black uppercase tracking-tighter text-primary bg-primary/5 px-2 py-1 rounded-md">SOS Signal</span>
                    </div>

                    <div class="flex-1 space-y-6">
                        <div>
                            <span class="text-[10px] font-black tracking-[0.2em] text-slate-400 uppercase mb-2 block">${dateStr}</span>
                            <h4 class="text-3xl font-black text-on-surface tracking-tighter mb-4">Emergency Broadcast Issued</h4>
                            <p class="text-on-surface-variant font-medium text-base leading-relaxed opacity-70">${a.message}</p>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-slate-50/50 p-5 rounded-2xl border border-slate-100 transition-all hover:bg-white hover:border-blue-100 group/sub">
                                <div class="flex items-center gap-3 mb-2">
                                    <span class="material-symbols-outlined text-blue-600 text-sm">my_location</span>
                                    <span class="text-[10px] font-black uppercase tracking-widest text-blue-900 opacity-60">Location</span>
                                </div>
                                <p class="text-sm font-bold text-slate-600">${a.location && a.location.lat ? `${a.location.lat.toFixed(4)}° N, ${a.location.lng.toFixed(4)}° E` : 'Location unknown'}</p>
                            </div>
                            
                            <div class="bg-slate-50/50 p-5 rounded-2xl border border-slate-100 transition-all hover:bg-white hover:border-primary/10 group/sub">
                                <div class="flex items-center gap-3 mb-2">
                                    <span class="material-symbols-outlined text-primary text-sm">hub</span>
                                    <span class="text-[10px] font-black uppercase tracking-widest text-primary opacity-60">Responders Notified</span>
                                </div>
                                <p class="text-sm font-bold text-slate-600 truncate">${responderNames}</p>
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function setupHeader() {
            const profile = await apiCall(`/auth/profile/${username}`);
            if (profile && profile.fullName) {
                document.getElementById('navAvatar').src = `https://ui-avatars.com/api/?name=${profile.fullName}&background=0f172a&color=af101a&bold=true`;
            } else {
                document.getElementById('navAvatar').src = `https://ui-avatars.com/api/?name=${username}&background=0f172a&color=af101a&bold=true`;
            }
        }

        setupHeader();
        loadHistory();
    </script>
</body>
</html>
