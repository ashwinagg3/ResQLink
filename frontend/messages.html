<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ResQLink | Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.155.0/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#af101a",
                        "surface": "#fff8f7",
                        "on-surface": "#271816",
                        "on-surface-variant": "#5b403d"
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --mesh-color-1: #af101a05;
            --mesh-color-2: #ffffff;
        }
        body {
            background-color: var(--mesh-color-2);
            background-image: 
                radial-gradient(at 0% 0%, var(--mesh-color-1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, #af101a08 0, transparent 50%), 
                radial-gradient(at 100% 0%, var(--mesh-color-1) 0, transparent 50%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow-x: hidden;
        }
        .bg-3d-wrap {
            position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;
        }
        .bg-3d-primitive {
            position: absolute; opacity: 0.05; animation: float-tactical 25s infinite linear;
        }
        .sphere-1 { width: 500px; height: 500px; background: radial-gradient(circle at 30% 30%, #af101a, transparent 70%); top: -150px; left: -150px; filter: blur(80px); }
        .sphere-2 { width: 300px; height: 300px; background: radial-gradient(circle at 30% 30%, #af101a, transparent 70%); bottom: -50px; right: -50px; filter: blur(60px); animation-delay: -5s; }
        
        .tactical-pane {
            width: 200px; height: 300px; background: rgba(175, 16, 26, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(175, 16, 26, 0.08); border-radius: 20px;
            transform: perspective(1000px) rotateX(20deg) rotateY(-20deg); position: absolute; animation: float-3d-pane 20s infinite ease-in-out;
        }
        .pane-1 { top: 20%; right: 5%; }
        .pane-2 { bottom: 20%; left: 10%; animation-delay: -10s; }

        @keyframes float-tactical { from { transform: rotate(0deg) translate(20px, 0) rotate(0deg); } to { transform: rotate(360deg) translate(20px, 0) rotate(-360deg); } }
        @keyframes float-3d-pane { 0%, 100% { transform: perspective(1000px) rotateX(20deg) rotateY(-20deg) translateY(0); } 50% { transform: perspective(1000px) rotateX(25deg) rotateY(-15deg) translateY(-30px); } }

        .glass-header { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid rgba(175, 16, 26, 0.05); }
        .premium-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.02); }
        
        .message-bubble { max-width: 80%; padding: 16px 24px; border-radius: 24px; font-weight: 500; font-size: 14px; line-height: 1.6; }
        .message-sent { background: #0f172a; color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
        .message-received { background: white; color: #0f172a; border-bottom-left-radius: 4px; border: 1px solid rgba(0,0,0,0.05); align-self: flex-start; }
        
        .chat-sidebar { width: 350px; border-right: 1px solid rgba(0,0,0,0.05); }
        .conversation-item { transition: all 0.2s; border-radius: 20px; cursor: pointer; }
        .conversation-item:hover { background: rgba(175, 16, 26, 0.03); }
        .conversation-item.active { background: rgba(175, 16, 26, 0.08); border: 1px solid rgba(175, 16, 26, 0.1); }

        .chat-container { height: calc(100vh - 120px); }
        .messages-viewport { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        
        .premium-badge { background: linear-gradient(135deg, #af101a 0%, #ff4d4d 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="text-on-surface min-h-screen">
    <div class="bg-3d-wrap">
        <div class="bg-3d-primitive sphere-1"></div>
        <div class="bg-3d-primitive sphere-2"></div>
        <div class="tactical-pane pane-1"></div>
        <div class="tactical-pane pane-2"></div>
    </div>
    
    <header class="h-20 flex items-center px-8 glass-header shadow-sm sticky top-0 z-40">
        <div class="flex-1">
            <div class="text-2xl font-black tracking-tighter text-primary cursor-pointer active:scale-95 transition-transform inline-block" onclick="window.location.href='dashboard.html'">ResQLink</div>
        </div>
        <nav class="hidden md:flex gap-8 items-center h-full">
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm" href="dashboard.html">Dashboard</a>
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm" href="family.html">Family</a>
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm" href="contacts.html">Contacts</a>
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm" href="directory.html">Directory</a>
            <a class="text-primary font-black border-b-2 border-primary pb-1 tracking-tight cursor-pointer text-sm font-black" href="messages.html">Messages</a>
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm" href="history.html">History</a>
        </nav>
        <div class="flex-1 flex justify-end items-center gap-4">
            <button onclick="logout()" class="p-2 text-slate-400 hover:text-primary transition-colors"><span class="material-symbols-outlined">logout</span></button>
            <div onclick="window.location.href='profile.html'" id="navAvatarContainer" class="w-10 h-10 rounded-full overflow-hidden border-2 border-slate-100 cursor-pointer shadow-sm hover:border-primary transition-all">
                <img src="https://ui-avatars.com/api/?name=User&background=0f172a&color=af101a&bold=true" id="navAvatar" alt="Profile"/>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="premium-card rounded-[3rem] overflow-hidden flex chat-container shadow-2xl">
            <!-- Sidebar -->
            <aside class="chat-sidebar bg-white/50 flex flex-col">
                <div class="p-8 border-b border-slate-100">
                    <h2 class="text-2xl font-black tracking-tight mb-6">Secured <span class="premium-badge">Comm</span></h2>
                    <div class="relative">
                        <input id="searchUser" type="text" placeholder="Search signals..." class="w-full bg-slate-50 border-0 rounded-2xl p-4 pl-12 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all"/>
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xl">search</span>
                    </div>
                </div>
                <div id="conversationsList" class="flex-1 overflow-y-auto p-4 space-y-2">
                    <!-- Conversations loaded via JS -->
                    <div class="p-12 text-center text-slate-400">
                        <span class="material-symbols-outlined text-4xl mb-4 opacity-20">forum</span>
                        <p class="text-[10px] font-black uppercase tracking-widest">Scanning for active nodes...</p>
                    </div>
                </div>
            </aside>

            <!-- Chat View -->
            <section class="flex-1 flex flex-col bg-slate-50/50">
                <div id="chatHeader" class="h-24 px-8 border-b border-slate-100 flex items-center justify-between bg-white/40">
                    <div class="flex items-center gap-4">
                        <div id="activeChatAvatar" class="w-12 h-12 rounded-2xl overflow-hidden bg-slate-100 border border-slate-200">
                            <img src="https://ui-avatars.com/api/?name=?&background=0f172a&color=af101a&bold=true" class="w-full h-full object-cover"/>
                        </div>
                        <div>
                            <h3 id="activeChatName" class="font-black text-lg tracking-tight">Select a contact</h3>
                            <p id="activeChatStatus" class="text-[10px] font-black uppercase tracking-widest text-slate-400 items-center flex gap-1.5">
                                <span class="w-1.5 h-1.5 rounded-full bg-slate-200"></span> Standby
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-white hover:shadow-sm transition-all text-slate-400 hover:text-primary"><span class="material-symbols-outlined">call</span></button>
                        <button class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-white hover:shadow-sm transition-all text-slate-400 hover:text-primary"><span class="material-symbols-outlined">videocam</span></button>
                    </div>
                </div>

                <div id="messagesViewport" class="messages-viewport">
                    <!-- Messages loaded via JS -->
                    <div class="flex-1 flex flex-col items-center justify-center text-slate-300 gap-4 opacity-50">
                        <span class="material-symbols-outlined text-6xl">chat_bubble</span>
                        <p class="font-black text-xs uppercase tracking-[0.3em]">End-to-End Encrypted Terminal</p>
                    </div>
                </div>

                <div class="p-8 bg-white/40 border-t border-slate-100">
                    <form id="messageForm" class="flex gap-4">
                        <input id="messageInput" type="text" placeholder="Transmit signal..." required class="flex-1 bg-white border-0 rounded-[2rem] px-8 py-5 text-sm font-bold shadow-sm focus:ring-2 focus:ring-primary/20 transition-all" autocomplete="off"/>
                        <button type="submit" class="w-16 h-16 rounded-full bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/20 hover:scale-105 active:scale-95 transition-all">
                            <span class="material-symbols-outlined">send</span>
                        </button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
    <script src="immersive.js"></script>
    <script>
        const username = localStorage.getItem('username');
        let activeChat = null;

        async function loadConversations() {
            const conversations = await apiCall('/messages/conversations');
            const list = document.getElementById('conversationsList');
            if (!conversations || conversations.length === 0) {
                list.innerHTML = `<div class="p-12 text-center text-slate-400"><p class="text-[10px] font-black uppercase tracking-widest">No signals found</p></div>`;
                return;
            }

            list.innerHTML = '';
            conversations.forEach(c => {
                const item = document.createElement('div');
                item.className = `conversation-item p-4 flex gap-4 ${activeChat === c._id ? 'active' : ''}`;
                item.onclick = () => selectChat(c._id);
                
                const timeStr = new Date(c.lastTimestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                item.innerHTML = `
                    <div class="w-12 h-12 rounded-2xl overflow-hidden bg-slate-100 border border-slate-100">
                        <img src="https://ui-avatars.com/api/?name=${c._id}&background=0f172a&color=af101a&bold=true" class="w-full h-full object-cover"/>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-center mb-1">
                            <h4 class="font-black text-sm truncate">${c._id}</h4>
                            <span class="text-[9px] font-bold text-slate-400">${timeStr}</span>
                        </div>
                        <p class="text-xs text-slate-400 truncate font-medium">${c.lastMessage}</p>
                    </div>
                    ${c.unreadCount > 0 ? `<div class="w-5 h-5 rounded-full bg-primary text-white text-[10px] font-black flex items-center justify-center shrink-0 self-center">${c.unreadCount}</div>` : ''}
                `;
                list.appendChild(item);
            });
        }

        async function selectChat(contactUsername) {
            activeChat = contactUsername;
            document.getElementById('activeChatName').innerText = contactUsername;
            document.getElementById('activeChatAvatar').querySelector('img').src = `https://ui-avatars.com/api/?name=${contactUsername}&background=0f172a&color=af101a&bold=true`;
            document.getElementById('activeChatStatus').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Online';
            
            // Re-render list to update active state
            loadConversations();
            loadMessages();
        }

        async function loadMessages() {
            if (!activeChat) return;
            const messages = await apiCall(`/messages/${activeChat}`);
            const viewport = document.getElementById('messagesViewport');
            viewport.innerHTML = '';

            messages.forEach(m => {
                const bubble = document.createElement('div');
                bubble.className = `message-bubble ${m.sender === username ? 'message-sent' : 'message-received'}`;
                bubble.innerText = m.content;
                viewport.appendChild(bubble);
            });
            
            viewport.scrollTop = viewport.scrollHeight;
        }

        document.getElementById('messageForm').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || !activeChat) return;

            const res = await apiCall('/messages', 'POST', { receiver: activeChat, content });
            if (res._id) {
                input.value = '';
                loadMessages();
                loadConversations();
            } else {
                showNotification(res.message || 'Error sending message', 'error');
            }
        };

        // Initialize
        loadConversations();
        setInterval(loadConversations, 5000); // Polling for new messages
        setInterval(loadMessages, 3000);      // Polling for chat messages
    </script>
</body>
</html>
