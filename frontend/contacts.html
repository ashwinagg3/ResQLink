<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ResQLink | Contacts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0"
        rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.155.0/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#af101a",
                        "surface": "#fff8f7",
                        "on-surface": "#271816",
                        "on-surface-variant": "#5b403d"
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --mesh-color-1: #af101a05;
            --mesh-color-2: #ffffff;
        }

        body {
            background-color: var(--mesh-color-2);
            background-image:
                radial-gradient(at 0% 0%, var(--mesh-color-1) 0, transparent 50%),
                radial-gradient(at 50% 0%, #af101a08 0, transparent 50%),
                radial-gradient(at 100% 0%, var(--mesh-color-1) 0, transparent 50%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* Serious Tactical Background */
        .bg-3d-wrap {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-3d-primitive {
            position: absolute;
            opacity: 0.05;
            animation: float-tactical 25s infinite linear;
        }

        .sphere-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle at 30% 30%, #af101a, transparent 70%);
            top: -150px;
            left: -150px;
            filter: blur(80px);
        }

        .sphere-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle at 30% 30%, #af101a, transparent 70%);
            bottom: -50px;
            right: -50px;
            filter: blur(60px);
            animation-delay: -5s;
        }

        /* Tactical Glass Panes */
        .tactical-pane {
            width: 200px;
            height: 300px;
            background: rgba(175, 16, 26, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(175, 16, 26, 0.08);
            border-radius: 20px;
            transform: perspective(1000px) rotateX(20deg) rotateY(-20deg);
            position: absolute;
            animation: float-3d-pane 20s infinite ease-in-out;
        }

        .pane-1 {
            top: 20%;
            right: 5%;
        }

        .pane-2 {
            bottom: 20%;
            left: 10%;
            animation-delay: -10s;
        }

        @keyframes float-tactical {
            from {
                transform: rotate(0deg) translate(20px, 0) rotate(0deg);
            }

            to {
                transform: rotate(360deg) translate(20px, 0) rotate(-360deg);
            }
        }

        @keyframes float-3d-pane {

            0%,
            100% {
                transform: perspective(1000px) rotateX(20deg) rotateY(-20deg) translateY(0);
            }

            50% {
                transform: perspective(1000px) rotateX(25deg) rotateY(-15deg) translateY(-30px);
            }
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(175, 16, 26, 0.05);
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .premium-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: white;
            border-color: rgba(175, 16, 26, 0.1);
            shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.08);
        }

        .premium-badge {
            background: linear-gradient(135deg, #af101a 0%, #ff4d4d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cta-button {
            background: linear-gradient(135deg, #020617 0%, #1e293b 100%);
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -6px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body class="text-on-surface min-h-screen">
    <div class="bg-3d-wrap">
        <div class="bg-3d-primitive sphere-1"></div>
        <div class="bg-3d-primitive sphere-2"></div>
        <div class="tactical-pane pane-1"></div>
        <div class="tactical-pane pane-2"></div>
    </div>
    <header class="h-20 flex items-center px-8 glass-header shadow-sm sticky top-0 z-40">
        <!-- Logo (Left) -->
        <div class="flex-1">
            <div class="text-2xl font-black tracking-tighter text-primary cursor-pointer active:scale-95 transition-transform inline-block"
                onclick="window.location.href='dashboard.html'">ResQLink</div>
        </div>

        <!-- Navigation (Center) -->
        <nav class="hidden md:flex gap-8 items-center h-full">
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm"
                href="dashboard.html">Dashboard</a>
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm"
                href="family.html">Family</a>
            <a class="text-primary font-black border-b-2 border-primary pb-1 tracking-tight cursor-pointer text-sm"
                href="contacts.html">Contacts</a>
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm"
                href="directory.html">Directory</a>
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm"
                href="messages.html">Messages</a>
            <a class="text-on-surface font-bold hover:text-primary transition-colors tracking-tight cursor-pointer text-sm"
                href="history.html">History</a>
        </nav>

        <!-- Actions (Right) -->
        <div class="flex-1 flex justify-end items-center gap-4">
            <button onclick="logout()" class="p-2 text-slate-400 hover:text-primary transition-colors"><span
                    class="material-symbols-outlined">logout</span></button>
            <div onclick="window.location.href='profile.html'"
                class="w-10 h-10 rounded-full overflow-hidden border-2 border-slate-100 cursor-pointer shadow-sm hover:border-primary transition-all">
                <img src="https://ui-avatars.com/api/?name=User&background=0f172a&color=af101a&bold=true" id="navAvatar"
                    alt="Profile" />
            </div>
        </div>
    </header>

    <main class="py-16 px-6 max-w-7xl mx-auto">
        <header class="mb-20 flex flex-col md:flex-row md:items-end justify-between gap-8">
            <div class="max-w-2xl">
                <span class="text-[10px] font-black uppercase tracking-[0.4em] text-primary mb-4 block">Security
                    Circle</span>
                <h1 class="text-5xl md:text-6xl font-black tracking-tighter mb-6">Emergency <span
                        class="premium-badge">Responders</span></h1>
                <p class="text-on-surface-variant font-medium text-lg leading-relaxed opacity-80">Link verified nodes to
                    your emergency network for synchronized rescue coordination.</p>
            </div>
            <button onclick="toggleAddForm()"
                class="cta-button text-white px-10 py-5 rounded-3xl font-black text-sm uppercase tracking-widest flex items-center gap-3">
                <span class="material-symbols-outlined">person_add</span>
                Add Responder
            </button>
        </header>

        <!-- Dynamic Contacts Grid -->
        <div id="contactsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Loaded via JS -->
        </div>
    </main>

    <!-- Modal Portal -->
    <div id="addFormModal"
        class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-900/40 backdrop-blur-md p-6 animate-in fade-in duration-300">
        <div class="premium-card bg-white rounded-[3rem] p-10 max-w-lg w-full shadow-2xl scale-in-center">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-3xl font-black tracking-tighter">Link New Node</h3>
                <button onclick="toggleAddForm()" class="p-2 hover:bg-slate-50 rounded-full transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="contactForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Responder
                        Name</label>
                    <input id="name" required
                        class="w-full p-5 bg-slate-50 rounded-2xl border-0 focus:ring-2 focus:ring-primary/20 font-bold placeholder:text-slate-300 transition-all"
                        type="text" placeholder="e.g. Raj Sharma" />
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400">Contact
                            Number</label>
                        <input id="phone" required
                            class="w-full p-5 bg-slate-50 rounded-2xl border-0 focus:ring-2 focus:ring-primary/20 font-bold placeholder:text-slate-300 transition-all"
                            type="text" placeholder="+91 ..." />
                    </div>
                    <div class="space-y-2">
                        <label
                            class="text-[10px] font-black uppercase tracking-widest text-slate-400">Relationship</label>
                        <input id="relationship" required
                            class="w-full p-5 bg-slate-50 rounded-2xl border-0 focus:ring-2 focus:ring-primary/20 font-bold placeholder:text-slate-300 transition-all"
                            type="text" placeholder="e.g. Brother" />
                    </div>
                </div>
                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="toggleAddForm()"
                        class="flex-1 py-5 font-black text-xs uppercase tracking-widest text-slate-400 hover:bg-slate-50 rounded-2xl transition-all">Cancel</button>
                    <button type="submit"
                        class="cta-button flex-1 py-5 text-white font-black rounded-2xl text-xs uppercase tracking-widest shadow-xl shadow-slate-900/10 active:scale-95 transition-transform">Secure
                        Connection</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="immersive.js"></script>
    <script>
        const username = localStorage.getItem('username');

        async function loadContacts() {
            const contacts = await apiCall(`/contacts/${username}`);
            const grid = document.getElementById('contactsGrid');
            grid.innerHTML = '';

            if (contacts.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-32 premium-card rounded-[3rem] border-dashed border-2 flex flex-col items-center justify-center text-slate-400 gap-4 opacity-60">
                        <span class="material-symbols-outlined text-5xl">group_off</span>
                        <p class="font-black text-xs uppercase tracking-[0.2em]">No responders linked to your node.</p>
                    </div>
                `;
                return;
            }

            contacts.forEach(c => {
                const card = document.createElement('div');
                card.className = 'premium-card rounded-[2.5rem] p-10 group flex flex-col justify-between min-h-[300px] shadow-sm';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <div class="w-16 h-16 rounded-2xl bg-slate-50 text-slate-300 flex items-center justify-center group-hover:bg-primary/5 group-hover:text-primary transition-all duration-500">
                            <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">person</span>
                        </div>
                        <button onclick="deleteContact('${c._id}')" class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-200 hover:text-red-600 hover:bg-red-50 transition-all">
                            <span class="material-symbols-outlined text-xl">delete_sweep</span>
                        </button>
                    </div>
                    
                    <div>
                        <span class="text-[10px] font-black tracking-[0.2em] text-primary/60 uppercase mb-2 block">${c.relationship}</span>
                        <h3 class="text-3xl font-black text-on-surface tracking-tight leading-none">${c.name}</h3>
                        
                        <div class="flex items-center gap-3 mt-8 p-4 bg-slate-50 rounded-2xl border border-slate-100/50 group-hover:bg-white group-hover:border-primary/10 transition-all duration-500">
                            <div class="w-8 h-8 rounded-lg bg-green-500/10 text-green-600 flex items-center justify-center">
                                <span class="material-symbols-outlined text-sm">call</span>
                            </div>
                            <span class="font-bold text-sm text-slate-600 tracking-tight">${c.phone}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function deleteContact(id) {
            if (confirm('De-link this responder?')) {
                await apiCall(`/contacts/${id}`, 'DELETE');
                loadContacts();
            }
        }

        function toggleAddForm() {
            const modal = document.getElementById('addFormModal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                username,
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                relationship: document.getElementById('relationship').value
            };

            await apiCall('/contacts', 'POST', data);
            document.getElementById('contactForm').reset();
            toggleAddForm();
            loadContacts();
        });

        // Initialize Avatar
        async function setupHeader() {
            const profile = await apiCall(`/auth/profile/${username}`);
            if (profile && profile.fullName) {
                document.getElementById('navAvatar').src = `https://ui-avatars.com/api/?name=${profile.fullName}&background=0f172a&color=af101a&bold=true`;
            }
        }

        setupHeader();
        loadContacts();
    </script>
</body>

</html>
